# Application properties for Degree Planner application 

# This file configures the Spring Boot application, 
# including database connection settings, Hibernate behavior, and Actuator endpoints. 
spring.application.name=degree-planner

# Database configuration for SQLite
spring.datasource.url=jdbc:sqlite:degreeplanner.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect

# Hibernate DDL auto configuration. 'update' will update the database schema on application startup.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Actuator endpoints configuration to include health and info endpoints, and show health details when authorized.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

